<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFACOMPRAS - Gestión Avanzada</title>
    <link rel="icon" href="logo.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        alfagreen: '#1aa31a', 
                        alfagrey: '#4a4a4a',
                        whatsapp: '#25D366'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Navegación -->
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-40 border-b border-gray-200">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="AlfaCredit Logo" class="h-10 object-contain" onerror="this.style.display='none'">
                <h1 class="text-2xl font-extrabold text-alfagrey tracking-tight">ALFA<span class="text-alfagreen">COMPRAS</span></h1>
            </div>
            <div class="flex gap-2">
                <button onclick="showView('catalog')" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md font-semibold hover:bg-gray-200 transition"><i class="fas fa-store"></i> Catálogo</button>
                <button onclick="tryAdmin()" class="px-4 py-2 bg-alfagrey text-white rounded-md font-semibold hover:bg-black transition"><i class="fas fa-cog"></i> Admin</button>
            </div>
        </div>
    </nav>

    <!-- VISTA CLIENTE -->
    <main id="catalogView" class="max-w-7xl mx-auto p-6 block">
        <div class="text-center mb-10 mt-4">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Productos Disponibles</h2>
            <p class="text-gray-500">Encuentra lo que buscas al mejor precio.</p>
        </div>
        
        <div class="max-w-lg mx-auto mb-10 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <label class="block text-sm font-semibold text-gray-600 mb-2"><i class="fas fa-user-circle text-alfagreen"></i> ¿Quién realiza el pedido?</label>
            <input type="text" id="globalClientName" placeholder="Ingresa tu nombre y apellido" class="w-full bg-gray-100 text-gray-800 rounded-lg border-none p-3 focus:ring-2 focus:ring-alfagreen outline-none transition">
        </div>

        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <!-- VISTA ADMIN -->
    <main id="adminView" class="max-w-7xl mx-auto p-6 hidden">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 class="text-3xl font-bold text-gray-800">Panel de Control</h2>
            <div class="flex gap-3">
                <!-- BOTÓN PARA DESCARGAR BASE DE DATOS -->
                <button onclick="downloadInventoryCSV()" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-bold shadow-sm hover:bg-blue-700 transition flex items-center gap-2">
                    <i class="fas fa-file-excel"></i> Descargar Reporte
                </button>
                <button onclick="logoutAdmin()" class="px-4 py-2 bg-red-100 text-red-600 rounded-lg font-bold hover:bg-red-200 transition"><i class="fas fa-sign-out-alt"></i> Salir</button>
            </div>
        </div>
        
        <!-- Formulario Crear/Editar -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8">
            <h3 class="text-xl font-bold mb-4 text-alfagreen" id="formTitle">Agregar Nuevo Producto</h3>
            <form id="productForm" onsubmit="saveProduct(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="hidden" id="productId">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Nombre del Artículo</label>
                    <input type="text" id="name" required class="mt-1 w-full rounded-md border-gray-300 border p-2 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Precio ($)</label>
                    <input type="number" step="0.01" id="price" required class="mt-1 w-full rounded-md border-gray-300 border p-2 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Sucursal</label>
                    <input type="text" id="department" required class="mt-1 w-full rounded-md border-gray-300 border p-2 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Enlaces de G-Drive (Separados por coma)</label>
                    <input type="text" id="images" required class="mt-1 w-full rounded-md border-gray-300 border p-2 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-sm font-medium text-gray-700">Descripción</label>
                    <textarea id="description" required rows="2" class="mt-1 w-full rounded-md border-gray-300 border p-2 focus:ring-alfagreen focus:border-alfagreen"></textarea>
                </div>
                <div class="md:col-span-3 flex justify-end gap-2 mt-2">
                    <button type="button" onclick="resetForm()" class="px-5 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 font-semibold">Cancelar</button>
                    <button type="submit" class="px-5 py-2 bg-alfagreen text-white rounded-md hover:bg-green-700 font-semibold">Guardar Producto</button>
                </div>
            </form>
        </div>

        <!-- Tabla de Gestión -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Producto</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Precio</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Estado</th>
                        <th class="px-6 py-4 text-center text-xs font-bold text-gray-500 uppercase">Registro Ventas</th>
                        <th class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase">Acciones Rápidas</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody" class="bg-white divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </main>

    <!-- MODAL: REGISTRAR VENTA -->
    <div id="saleModal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center z-50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-md w-full">
            <h3 class="text-2xl font-bold mb-1 text-alfagreen"><i class="fas fa-handshake"></i> Registrar Venta</h3>
            <p class="text-sm text-gray-500 mb-4">Ingresa los datos del cliente para el registro.</p>
            
            <form id="saleForm" onsubmit="confirmSale(event)">
                <input type="hidden" id="saleProductId">
                <div class="mb-3">
                    <label class="block text-sm font-bold text-gray-700">Nombre del Cliente *</label>
                    <input type="text" id="saleName" required class="w-full border p-2 rounded-lg mt-1 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-bold text-gray-700">Teléfono (Opcional)</label>
                    <input type="tel" id="salePhone" class="w-full border p-2 rounded-lg mt-1 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-bold text-gray-700">Cédula (Opcional)</label>
                    <input type="text" id="saleCedula" class="w-full border p-2 rounded-lg mt-1 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="closeSaleModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-alfagreen text-white rounded-lg font-bold">Confirmar Venta</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: VER HISTORIAL DE VENTAS -->
    <div id="historyModal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center z-50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-lg w-full">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800"><i class="fas fa-history text-alfagreen"></i> Historial del Producto</h3>
                <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="historyContent" class="max-h-60 overflow-y-auto space-y-3">
                <!-- Se inyecta con JS -->
            </div>
        </div>
    </div>

    <!-- MODAL: LOGIN -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center z-50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full text-center">
            <h3 class="text-2xl font-bold mb-2 text-gray-800">Acceso Admin</h3>
            <input type="password" id="adminPwd" class="w-full border-2 p-3 rounded-lg mb-6 text-center focus:border-alfagreen outline-none" placeholder="Contraseña">
            <div class="flex gap-3">
                <button onclick="closeLogin()" class="flex-1 px-4 py-3 bg-gray-100 rounded-lg font-semibold">Cancelar</button>
                <button onclick="checkAdminPassword()" class="flex-1 px-4 py-3 bg-alfagrey text-white rounded-lg font-semibold">Ingresar</button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "50586920352"; 
        let isAdminAuthed = false;

        function processDriveLinks(inputStr) {
            if (!inputStr) return [];
            return inputStr.split(',').map(url => {
                let cleanUrl = url.trim();
                const match = cleanUrl.match(/\/d\/([a-zA-Z0-9_-]+)/) || cleanUrl.match(/id=([a-zA-Z0-9_-]+)/);
                return match ? `https://lh3.googleusercontent.com/d/${match[1]}` : cleanUrl;
            }).filter(url => url !== "");
        }

        // CARGA Y GUARDADO DE DATOS (Preparado para ser base de datos)
        function loadData() {
            const data = localStorage.getItem('alfa_database');
            return data ? JSON.parse(data) : [];
        }
        function saveData() {
            localStorage.setItem('alfa_database', JSON.stringify(products));
        }

        let products = loadData();

        document.addEventListener('DOMContentLoaded', () => { renderCatalog(); renderAdmin(); });

        // --- SISTEMA DE LOGIN ---
        function tryAdmin() { if (isAdminAuthed) showView('admin'); else document.getElementById('loginModal').classList.remove('hidden'); }
        function closeLogin() { document.getElementById('loginModal').classList.add('hidden'); }
        function logoutAdmin() { isAdminAuthed = false; showView('catalog'); }
        function checkAdminPassword() {
            if (document.getElementById('adminPwd').value === 'admin') {
                isAdminAuthed = true;
                document.getElementById('adminPwd').value = '';
                closeLogin();
                showView('admin');
            } else { alert('❌ Contraseña incorrecta'); }
        }

        function showView(view) {
            document.getElementById('catalogView').style.display = view === 'catalog' ? 'block' : 'none';
            document.getElementById('adminView').style.display = view === 'admin' ? 'block' : 'none';
            if(view === 'catalog') renderCatalog();
        }

        // --- RENDERIZAR CLIENTE ---
        function renderCatalog() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            const activeProducts = products.filter(p => p.status === 'activo');
            
            if(activeProducts.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-10 text-center"><p class="text-gray-500">No hay productos disponibles.</p></div>';
                return;
            }

            activeProducts.forEach(p => {
                let img = (p.images && p.images.length > 0) ? p.images[0] : "https://via.placeholder.com/400x300?text=No+Img";
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col hover:-translate-y-1 transition duration-300">
                        <div class="h-56 p-2 flex justify-center items-center bg-white border-b border-gray-100">
                            <img src="${img}" class="max-h-full max-w-full object-contain">
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h3 class="text-lg font-bold text-gray-800">${p.name}</h3>
                            <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded w-max mt-1"><i class="fas fa-map-marker-alt"></i> ${p.department}</span>
                            <p class="text-gray-500 text-sm mt-3 mb-4 flex-grow">${p.description}</p>
                            <div class="flex justify-between items-center border-t border-gray-100 pt-4">
                                <span class="text-2xl font-black text-gray-900">$${parseFloat(p.price).toFixed(2)}</span>
                                <button onclick="sendWhatsapp(${p.id})" class="bg-alfagreen text-white font-bold px-4 py-2 rounded-xl hover:bg-green-600 transition"><i class="fab fa-whatsapp"></i> Pedir</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function sendWhatsapp(id) {
            let clientName = document.getElementById('globalClientName').value.trim();
            if(!clientName) { alert("Ingresa tu nombre arriba para hacer el pedido."); return; }
            const p = products.find(prod => prod.id === id);
            const text = `¡Hola! Soy *${clientName}*.\n\nMe interesa el artículo:\n📦 *${p.name}*\n📍 ${p.department}\n💵 $${p.price}\n\n¿Aún está disponible?`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`, '_blank');
        }

        // --- RENDERIZAR ADMIN ---
        function renderAdmin() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            
            [...products].reverse().forEach(p => {
                let statusBadge = p.status === 'activo' ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">Activo</span>' :
                                  p.status === 'vendido' ? '<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold">Vendido</span>' :
                                  '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">Inactivo</span>';

                let historyCount = p.historial ? p.historial.length : 0;
                let historyBtn = historyCount > 0 
                    ? `<button onclick="openHistoryModal(${p.id})" class="text-xs bg-blue-50 text-blue-600 font-bold px-2 py-1 rounded border border-blue-200 hover:bg-blue-100"><i class="fas fa-list"></i> Ver (${historyCount})</button>` 
                    : `<span class="text-xs text-gray-400">Sin ventas</span>`;

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b">
                        <td class="px-6 py-4"><div class="font-bold text-gray-800">${p.name}</div><div class="text-xs text-gray-500">${p.department}</div></td>
                        <td class="px-6 py-4 font-bold text-gray-600">$${parseFloat(p.price).toFixed(2)}</td>
                        <td class="px-6 py-4">${statusBadge}</td>
                        <td class="px-6 py-4 text-center">${historyBtn}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="editProduct(${p.id})" class="text-blue-500 bg-blue-50 p-2 rounded-lg mx-1 hover:bg-blue-100" title="Editar"><i class="fas fa-edit"></i></button>
                            <button onclick="initiateSale(${p.id})" class="text-yellow-600 bg-yellow-50 p-2 rounded-lg mx-1 hover:bg-yellow-100" title="Vender"><i class="fas fa-handshake"></i></button>
                            <button onclick="updateStatus(${p.id}, 'baja')" class="text-red-500 bg-red-50 p-2 rounded-lg mx-1 hover:bg-red-100" title="Baja"><i class="fas fa-arrow-down"></i></button>
                            <button onclick="updateStatus(${p.id}, 'activo')" class="text-green-600 bg-green-50 p-2 rounded-lg mx-1 hover:bg-green-100" title="Activar"><i class="fas fa-check"></i></button>
                        </td>
                    </tr>
                `;
            });
            saveData();
        }

        // --- GESTIÓN DE PRODUCTOS ---
        function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const pData = {
                name: document.getElementById('name').value,
                price: parseFloat(document.getElementById('price').value),
                department: document.getElementById('department').value,
                images: processDriveLinks(document.getElementById('images').value),
                description: document.getElementById('description').value,
            };

            if (id) {
                const idx = products.findIndex(p => p.id == id);
                pData.id = parseInt(id);
                pData.status = products[idx].status;
                pData.historial = products[idx].historial || []; // Mantener historial intácto
                products[idx] = pData;
            } else {
                pData.id = Date.now();
                pData.status = 'activo';
                pData.historial = [];
                products.push(pData);
            }
            resetForm(); renderAdmin(); renderCatalog();
        }

        function editProduct(id) {
            const p = products.find(prod => prod.id === id);
            document.getElementById('productId').value = p.id;
            document.getElementById('name').value = p.name;
            document.getElementById('price').value = p.price;
            document.getElementById('department').value = p.department;
            document.getElementById('images').value = p.images.join(', ');
            document.getElementById('description').value = p.description;
            document.getElementById('formTitle').innerText = "Editar Producto";
            window.scrollTo(0, 0);
        }

        function updateStatus(id, newStatus) {
            products.find(p => p.id === id).status = newStatus;
            renderAdmin(); renderCatalog();
        }

        // --- SISTEMA DE VENTAS Y CLIENTES ---
        function initiateSale(id) {
            document.getElementById('saleProductId').value = id;
            document.getElementById('saleName').value = '';
            document.getElementById('salePhone').value = '';
            document.getElementById('saleCedula').value = '';
            document.getElementById('saleModal').classList.remove('hidden');
        }

        function closeSaleModal() { document.getElementById('saleModal').classList.add('hidden'); }

        function confirmSale(e) {
            e.preventDefault();
            const id = parseInt(document.getElementById('saleProductId').value);
            const p = products.find(prod => prod.id === id);
            
            // Crear el registro del cliente
            const registro = {
                fecha: new Date().toLocaleDateString('es-ES'),
                nombre: document.getElementById('saleName').value,
                telefono: document.getElementById('salePhone').value || "No registrado",
                cedula: document.getElementById('saleCedula').value || "No registrada"
            };

            if(!p.historial) p.historial = [];
            p.historial.push(registro); // Guardar en el historial
            p.status = 'vendido'; // Cambiar estado

            closeSaleModal();
            renderAdmin(); renderCatalog();
            alert(`✅ Venta de ${p.name} registrada a ${registro.nombre}`);
        }

        // --- HISTORIAL ---
        function openHistoryModal(id) {
            const p = products.find(prod => prod.id === id);
            const content = document.getElementById('historyContent');
            content.innerHTML = '';
            
            [...p.historial].reverse().forEach(h => {
                content.innerHTML += `
                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <div class="flex justify-between"><span class="font-bold text-gray-800"><i class="fas fa-user text-alfagreen"></i> ${h.nombre}</span> <span class="text-xs text-gray-500">${h.fecha}</span></div>
                        <div class="text-sm text-gray-600 mt-1">📞 Tel: ${h.telefono} &nbsp;|&nbsp; 🪪 Cédula: ${h.cedula}</div>
                    </div>
                `;
            });
            document.getElementById('historyModal').classList.remove('hidden');
        }
        function closeHistoryModal() { document.getElementById('historyModal').classList.add('hidden'); }

        // --- EXPORTAR BASE DE DATOS (CSV) ---
        function downloadInventoryCSV() {
            let csv = "\uFEFF"; // BOM para que Excel lea los acentos (UTF-8)
            csv += "ID,Producto,Precio,Sucursal,Estado,Historial de Clientes\n";
            
            products.forEach(p => {
                let historyStr = "";
                if(p.historial && p.historial.length > 0) {
                    // Juntamos todo el historial en una sola celda
                    historyStr = p.historial.map(h => `[${h.fecha}] ${h.nombre} (Tel:${h.telefono})`).join(" | ");
                } else {
                    historyStr = "Sin ventas";
                }
                
                // Limpiar comas en los textos para no romper el CSV
                let safeName = p.name.replace(/,/g, '');
                let safeDept = p.department.replace(/,/g, '');
                
                csv += `${p.id},${safeName},${p.price},${safeDept},${p.status},"${historyStr}"\n`;
            });

            // Crear archivo y forzar descarga
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Base_Datos_ALFACOMPRAS_${new Date().toLocaleDateString('es-ES').replace(/\//g, '-')}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('formTitle').innerText = "Agregar Nuevo Producto";
        }
    </script>
</body>
</html>
