<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFACOMPRAS - Catálogo</title>
    
    <!-- FAVICON (El logo en la pestaña del navegador) -->
    <link rel="icon" href="logo.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        /* Colores basados en la marca AlfaCredit */
                        alfagreen: '#1aa31a', 
                        alfagrey: '#4a4a4a',
                        primary: '#1f2937', 
                        whatsapp: '#25D366',
                        darkinput: '#2b2b36'
                    }
                }
            }
        }
    </script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Efecto suave para las tarjetas */
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Navegación Superior -->
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-40 border-b border-gray-200">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- LOGO Y TÍTULO -->
            <div class="flex items-center gap-3">
                <!-- Asegúrate de tener la imagen logo.png en tu repositorio -->
                <img src="logo.png" alt="AlfaCredit Logo" class="h-10 object-contain" onerror="this.style.display='none'">
                <h1 class="text-2xl font-extrabold text-alfagrey tracking-tight">ALFA<span class="text-alfagreen">COMPRAS</span></h1>
            </div>
            
            <div class="flex gap-2">
                <button onclick="showView('catalog')" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md font-semibold transition hover:bg-gray-200"><i class="fas fa-store"></i> Catálogo</button>
                <button onclick="tryAdmin()" class="px-4 py-2 bg-alfagrey text-white rounded-md font-semibold transition hover:bg-black"><i class="fas fa-cog"></i> Admin</button>
            </div>
        </div>
    </nav>

    <!-- VISTA CLIENTE: Catálogo -->
    <main id="catalogView" class="max-w-7xl mx-auto p-6 block">
        <div class="text-center mb-10 mt-4">
            <h2 class="text-3xl md:text-4xl font-bold text-gray-800 mb-3">Productos Disponibles</h2>
            <p class="text-gray-500">¡Confiamos en ti! Encuentra lo que buscas al mejor precio.</p>
        </div>
        
        <!-- Input oscuro para el nombre del cliente -->
        <div class="max-w-lg mx-auto mb-10 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <label class="block text-sm font-semibold text-gray-600 mb-2"><i class="fas fa-user-circle text-alfagreen"></i> ¿Quién realiza el pedido?</label>
            <input type="text" id="globalClientName" placeholder="Ingresa tu nombre y apellido" class="w-full bg-darkinput text-white rounded-lg border-none p-3 focus:ring-2 focus:ring-alfagreen outline-none transition">
        </div>

        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Los productos se inyectan aquí con JS -->
        </div>
    </main>

    <!-- VISTA ADMIN: Panel de Gestión -->
    <main id="adminView" class="max-w-7xl mx-auto p-6 hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Panel de Administración</h2>
            <button onclick="logoutAdmin()" class="text-red-500 hover:text-red-700 font-bold px-4 py-2 bg-red-50 rounded-lg"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
        
        <!-- Formulario para Crear/Editar -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
            <h3 class="text-xl font-bold mb-4 text-alfagreen" id="formTitle">Agregar Nuevo Producto</h3>
            <form id="productForm" onsubmit="saveProduct(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="productId">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del Artículo</label>
                    <input type="text" id="name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Precio ($)</label>
                    <input type="number" step="0.01" id="price" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Sucursal / Ubicación</label>
                    <input type="text" id="department" required placeholder="Ej. Estelí, Managua..." class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Enlaces de G-Drive (Separados por coma)</label>
                    <input type="text" id="images" required placeholder="Pega el link de Google Drive aquí" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-alfagreen focus:border-alfagreen">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Descripción</label>
                    <textarea id="description" required rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-alfagreen focus:border-alfagreen"></textarea>
                </div>
                <div class="md:col-span-2 flex justify-end gap-2 mt-4">
                    <button type="button" onclick="resetForm()" class="px-5 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 font-semibold">Cancelar</button>
                    <button type="submit" class="px-5 py-2 bg-alfagreen text-white rounded-md hover:bg-green-700 font-semibold shadow-sm">Guardar Producto</button>
                </div>
            </form>
        </div>

        <!-- Tabla de Gestión -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Producto</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Precio</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Sucursal</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Estado</th>
                            <th class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Filas inyectadas con JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal de Login Admin -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center z-50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fas fa-lock"></i>
            </div>
            <h3 class="text-2xl font-bold mb-2 text-gray-800">Acceso Admin</h3>
            <p class="text-sm text-gray-500 mb-6">Ingresa la contraseña para gestionar el inventario.</p>
            <input type="password" id="adminPwd" class="w-full border-2 border-gray-200 p-3 rounded-lg mb-6 text-center focus:border-alfagreen outline-none transition" placeholder="Contraseña">
            <div class="flex justify-center gap-3">
                <button onclick="closeLogin()" class="flex-1 px-4 py-3 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold transition">Cancelar</button>
                <button onclick="checkAdminPassword()" class="flex-1 px-4 py-3 bg-alfagrey text-white rounded-lg hover:bg-black font-semibold transition">Ingresar</button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "50586920352"; 
        let isAdminAuthed = false;

        // NUEVA FUNCIÓN PARA ENLACES DE DRIVE (Más robusta contra los bloqueos de Google)
        function processDriveLinks(inputStr) {
            if (!inputStr) return [];
            return inputStr.split(',').map(url => {
                let cleanUrl = url.trim();
                // Busca el ID del archivo en diferentes formatos de URL de Drive
                const match = cleanUrl.match(/\/d\/([a-zA-Z0-9_-]+)/) || cleanUrl.match(/id=([a-zA-Z0-9_-]+)/);
                if (match) {
                    // Usamos lh3.googleusercontent.com, que suele permitir la incrustación de imágenes
                    return `https://lh3.googleusercontent.com/d/${match[1]}`;
                }
                return cleanUrl;
            }).filter(url => url !== "");
        }

        const defaultProducts = [
            { id: 1, name: "ALFACREDIT S.A", price: 1000000, department: "ESTELI", images: ["logo.png"], description: "VENDO TODA LA COMPAÑIA PARA TI BABY", status: "activo" }
        ];

        let products = JSON.parse(localStorage.getItem('products')) || defaultProducts;

        document.addEventListener('DOMContentLoaded', () => { renderCatalog(); renderAdmin(); });

        function tryAdmin() {
            if (isAdminAuthed) { showView('admin'); } 
            else { document.getElementById('loginModal').classList.remove('hidden'); }
        }
        function closeLogin() { document.getElementById('loginModal').classList.add('hidden'); }
        function logoutAdmin() { isAdminAuthed = false; showView('catalog'); }
        function checkAdminPassword() {
            const pwd = document.getElementById('adminPwd').value;
            if (pwd === 'admin') {
                isAdminAuthed = true;
                document.getElementById('adminPwd').value = '';
                closeLogin();
                showView('admin');
            } else { alert('❌ Contraseña incorrecta'); }
        }

        function showView(view) {
            document.getElementById('catalogView').style.display = view === 'catalog' ? 'block' : 'none';
            document.getElementById('adminView').style.display = view === 'admin' ? 'block' : 'none';
            if(view === 'catalog') renderCatalog();
        }

        function renderCatalog() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            const activeProducts = products.filter(p => p.status === 'activo');
            
            if(activeProducts.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-10 text-center"><i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i><p class="text-gray-500 text-lg">No hay productos disponibles.</p></div>';
                return;
            }

            activeProducts.forEach(p => {
                let imagesHtml = '';
                const fallbackImg = "https://via.placeholder.com/400x300?text=Imagen+No+Disponible";
                
                if (p.images && p.images.length > 1) {
                    imagesHtml = `<div class="flex overflow-x-auto snap-x snap-mandatory scrollbar-hide h-60 bg-white border-b border-gray-100">`;
                    p.images.forEach(img => {
                        imagesHtml += `<img src="${img}" onerror="this.onerror=null; this.src='${fallbackImg}';" class="w-full h-full object-contain shrink-0 snap-center p-2">`;
                    });
                    imagesHtml += `</div><div class="text-center text-[10px] font-bold text-gray-400 bg-gray-50 py-1 border-b border-gray-100">↔ Desliza para ver más</div>`;
                } else {
                    let singleImg = p.images && p.images.length > 0 ? p.images[0] : fallbackImg;
                    imagesHtml = `<div class="h-60 bg-white border-b border-gray-100 p-2 flex justify-center items-center">
                                    <img src="${singleImg}" onerror="this.onerror=null; this.src='${fallbackImg}';" class="max-h-full max-w-full object-contain">
                                  </div>`;
                }

                grid.innerHTML += `
                    <div class="product-card bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                        ${imagesHtml}
                        <div class="p-6 flex-grow flex flex-col">
                            <div class="flex justify-between items-start mb-3">
                                <h3 class="text-xl font-bold text-gray-800 leading-tight pr-2">${p.name}</h3>
                                <span class="bg-blue-50 text-blue-600 text-xs px-3 py-1.5 rounded-full font-bold whitespace-nowrap"><i class="fas fa-map-marker-alt"></i> ${p.department}</span>
                            </div>
                            <p class="text-gray-500 text-sm mb-6 flex-grow leading-relaxed">${p.description}</p>
                            <div class="flex justify-between items-center mt-auto pt-4 border-t border-gray-100">
                                <span class="text-2xl font-black text-gray-900">$${parseFloat(p.price).toFixed(2)}</span>
                                <button onclick="sendWhatsapp(${p.id})" class="bg-alfagreen text-white font-bold px-5 py-2.5 rounded-xl hover:bg-green-600 transition flex items-center gap-2 shadow-sm hover:shadow-md">
                                    <i class="fab fa-whatsapp text-xl"></i> Pedir
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function sendWhatsapp(id) {
            let clientName = document.getElementById('globalClientName').value.trim();
            if(!clientName) {
                alert("Por favor, ingresa tu nombre en la parte superior antes de hacer un pedido.");
                document.getElementById('globalClientName').focus();
                return;
            }
            
            const product = products.find(p => p.id === id);
            const text = `¡Hola! Soy *${clientName}*.\n\nMe interesa el artículo de ALFACOMPRAS:\n📦 *${product.name}*\n📍 Sucursal: ${product.department}\n💵 Precio: $${product.price}\n\n¿Aún está disponible?`;
            
            const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        // --- PANEL ADMIN ---
        function renderAdmin() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            
            [...products].reverse().forEach(p => {
                let statusBadge = '';
                if(p.status === 'activo') statusBadge = '<span class="px-3 py-1 text-xs font-bold rounded-full bg-green-100 text-green-700">Activo</span>';
                else if(p.status === 'vendido') statusBadge = '<span class="px-3 py-1 text-xs font-bold rounded-full bg-yellow-100 text-yellow-700">Vendido</span>';
                else statusBadge = '<span class="px-3 py-1 text-xs font-bold rounded-full bg-red-100 text-red-700">Inactivo</span>';

                let thumb = p.images && p.images.length > 0 ? p.images[0] : 'https://via.placeholder.com/40';

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <img class="h-12 w-12 rounded-lg object-cover border border-gray-200" src="${thumb}" onerror="this.src='https://via.placeholder.com/40'">
                                <div class="ml-4 font-bold text-gray-800">${p.name}</div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-600">$${parseFloat(p.price).toFixed(2)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500"><i class="fas fa-map-marker-alt text-gray-400 mr-1"></i> ${p.department}</td>
                        <td class="px-6 py-4 whitespace-nowrap">${statusBadge}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick="editProduct(${p.id})" class="text-blue-500 hover:text-blue-700 bg-blue-50 p-2 rounded-lg mx-1 transition"><i class="fas fa-edit"></i></button>
                            <button onclick="changeStatus(${p.id}, 'vendido')" class="text-yellow-600 hover:text-yellow-800 bg-yellow-50 p-2 rounded-lg mx-1 transition" title="Marcar Vendido"><i class="fas fa-shopping-cart"></i></button>
                            <button onclick="changeStatus(${p.id}, 'baja')" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-lg mx-1 transition" title="Dar de baja"><i class="fas fa-ban"></i></button>
                            <button onclick="changeStatus(${p.id}, 'activo')" class="text-green-600 hover:text-green-800 bg-green-50 p-2 rounded-lg mx-1 transition" title="Activar"><i class="fas fa-check-circle"></i></button>
                            <button onclick="deleteProduct(${p.id})" class="text-gray-400 hover:text-red-600 ml-3 p-2 transition" title="Eliminar definitivamente"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
            localStorage.setItem('products', JSON.stringify(products));
        }

        function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const rawImages = document.getElementById('images').value;
            
            const productData = {
                name: document.getElementById('name').value,
                price: parseFloat(document.getElementById('price').value),
                department: document.getElementById('department').value,
                images: processDriveLinks(rawImages),
                description: document.getElementById('description').value,
                status: 'activo'
            };

            if (id) {
                const index = products.findIndex(p => p.id == id);
                productData.status = products[index].status; 
                productData.id = parseInt(id);
                products[index] = productData;
            } else {
                productData.id = Date.now(); 
                products.push(productData);
            }

            resetForm();
            renderAdmin();
            renderCatalog();
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            document.getElementById('productId').value = product.id;
            document.getElementById('name').value = product.name;
            document.getElementById('price').value = product.price;
            document.getElementById('department').value = product.department;
            
            // Revertir a la URL original de Drive si es posible para editar
            let displayImages = product.images.map(url => {
                const match = url.match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/);
                return match ? `https://drive.google.com/file/d/${match[1]}/view?usp=sharing` : url;
            });
            document.getElementById('images').value = displayImages.join(', ');
            
            document.getElementById('description').value = product.description;
            document.getElementById('formTitle').innerText = "Editar Producto";
            window.scrollTo(0, 0);
        }

        function changeStatus(id, newStatus) {
            const index = products.findIndex(p => p.id === id);
            products[index].status = newStatus;
            renderAdmin();
            renderCatalog();
        }

        function deleteProduct(id) {
            if(confirm("¿Estás seguro de eliminar este producto definitivamente?")) {
                products = products.filter(p => p.id !== id);
                renderAdmin();
                renderCatalog();
            }
        }

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('formTitle').innerText = "Agregar Nuevo Producto";
        }
    </script>
</body>
</html>
